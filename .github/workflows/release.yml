name: Release (Manual)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.version.outputs.new }}
      is_prerelease: ${{ steps.version.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          version=$(python3 -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('Cargo.toml').read_text())['workspace']['package']['version'])")
          echo "new=$version" >> "$GITHUB_OUTPUT"
          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Abort if tag already exists
        run: |
          if git ls-remote --tags origin "refs/tags/${{ steps.version.outputs.new }}" | grep -q .; then
            echo "::error::Tag ${{ steps.version.outputs.new }} already exists on remote"
            exit 1
          fi

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          # Clean up any leftover draft from a previous failed run with the same version.
          # A draft release doesn't create the git tag on the remote, so a stale draft is the
          # only thing that can collide here (real published tags are caught by the step above).
          if gh release view "${{ steps.version.outputs.new }}" --json isDraft --jq '.isDraft' 2>/dev/null | grep -qx true; then
            echo "Deleting stale draft release ${{ steps.version.outputs.new }}"
            gh release delete "${{ steps.version.outputs.new }}" --yes
          fi
          gh release create "${{ steps.version.outputs.new }}" \
            --draft \
            --target "${{ github.sha }}" \
            --title "Release ${{ steps.version.outputs.new }}" \
            --generate-notes \
            ${{ steps.version.outputs.prerelease == 'true' && '--prerelease' || '' }}

  build-linux:
    needs: setup
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux-amd64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            suffix: linux-arm64
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build Release
        run: cargo build --release --all-features --target ${{ matrix.target }}

      - name: Rename Binary
        run: mv target/${{ matrix.target }}/release/beam-rs target/release/beam-rs-${{ matrix.suffix }}

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.suffix }}
          path: target/release/beam-rs-${{ matrix.suffix }}

      - name: Rename WebRTC Binary
        run: mv target/${{ matrix.target }}/release/beam-rs-webrtc target/release/beam-rs-webrtc-${{ matrix.suffix }}

      - name: Upload WebRTC release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-webrtc-${{ matrix.suffix }}
          path: target/release/beam-rs-webrtc-${{ matrix.suffix }}

      - name: Rename Local Binary
        run: mv target/${{ matrix.target }}/release/beam-rs-local target/release/beam-rs-local-${{ matrix.suffix }}

      - name: Upload Local release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-local-${{ matrix.suffix }}
          path: target/release/beam-rs-local-${{ matrix.suffix }}

      - name: Rename Tor Binary
        run: mv target/${{ matrix.target }}/release/beam-rs-tor target/release/beam-rs-tor-${{ matrix.suffix }}

      - name: Upload Tor release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-tor-${{ matrix.suffix }}
          path: target/release/beam-rs-tor-${{ matrix.suffix }}

  build-other:
    needs: setup
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: macos-arm64
            binary: beam-rs
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: windows-amd64
            binary: beam-rs.exe
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build Release
        run: cargo build --release --all-features --target ${{ matrix.target }}

      - name: Rename Binary (Unix)
        if: runner.os != 'Windows'
        run: mv target/${{ matrix.target }}/release/${{ matrix.binary }} target/release/beam-rs-${{ matrix.suffix }}

      - name: Rename Binary (Windows)
        if: runner.os == 'Windows'
        run: move target\${{ matrix.target }}\release\${{ matrix.binary }} target\release\beam-rs-${{ matrix.suffix }}.exe

      - name: Upload release artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.suffix }}
          path: target/release/beam-rs-${{ matrix.suffix }}

      - name: Upload release artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.suffix }}
          path: target/release/beam-rs-${{ matrix.suffix }}.exe

      - name: Rename WebRTC Binary (Unix)
        if: runner.os != 'Windows'
        run: mv target/${{ matrix.target }}/release/beam-rs-webrtc target/release/beam-rs-webrtc-${{ matrix.suffix }}

      - name: Rename WebRTC Binary (Windows)
        if: runner.os == 'Windows'
        run: move target\${{ matrix.target }}\release\beam-rs-webrtc.exe target\release\beam-rs-webrtc-${{ matrix.suffix }}.exe

      - name: Upload WebRTC release artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: release-webrtc-${{ matrix.suffix }}
          path: target/release/beam-rs-webrtc-${{ matrix.suffix }}

      - name: Upload WebRTC release artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: release-webrtc-${{ matrix.suffix }}
          path: target/release/beam-rs-webrtc-${{ matrix.suffix }}.exe

      - name: Rename Local Binary (Unix)
        if: runner.os != 'Windows'
        run: mv target/${{ matrix.target }}/release/beam-rs-local target/release/beam-rs-local-${{ matrix.suffix }}

      - name: Rename Local Binary (Windows)
        if: runner.os == 'Windows'
        run: move target\${{ matrix.target }}\release\beam-rs-local.exe target\release\beam-rs-local-${{ matrix.suffix }}.exe

      - name: Upload Local release artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: release-local-${{ matrix.suffix }}
          path: target/release/beam-rs-local-${{ matrix.suffix }}

      - name: Upload Local release artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: release-local-${{ matrix.suffix }}
          path: target/release/beam-rs-local-${{ matrix.suffix }}.exe

      - name: Rename Tor Binary (Unix)
        if: runner.os != 'Windows'
        run: mv target/${{ matrix.target }}/release/beam-rs-tor target/release/beam-rs-tor-${{ matrix.suffix }}

      - name: Rename Tor Binary (Windows)
        if: runner.os == 'Windows'
        run: move target\${{ matrix.target }}\release\beam-rs-tor.exe target\release\beam-rs-tor-${{ matrix.suffix }}.exe

      - name: Upload Tor release artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: release-tor-${{ matrix.suffix }}
          path: target/release/beam-rs-tor-${{ matrix.suffix }}

      - name: Upload Tor release artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: release-tor-${{ matrix.suffix }}
          path: target/release/beam-rs-tor-${{ matrix.suffix }}.exe

  create-release:
    needs: [setup, build-linux, build-other]
    runs-on: ubuntu-latest
    steps:
      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Upload artifacts to draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: gh release upload "${{ needs.setup.outputs.release_tag }}" artifacts/* --clobber

      - name: Publish release (remove draft, creates the tag)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: gh release edit "${{ needs.setup.outputs.release_tag }}" --draft=false
